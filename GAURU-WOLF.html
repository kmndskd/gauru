<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ガウルくんはおおかみ</title>
<style>
:root{
  --bg:#07101c;
  --surface:#0d1a2e;
  --surface2:#142035;
  --border:rgba(80,160,255,.15);
  --blue:#5bbfff;
  --yellow:#ffd84a;
  --green:#7cffb2;
  --red:#ff7272;
  --pink:#ff99bb;
  --text:#e8f2ff;
  --muted:#7a9ccc;
  --dim:#3a5a84;
  --r:16px;
  --r-sm:12px;
  --shadow:0 8px 32px rgba(0,0,0,.5);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Hiragino Sans",sans-serif;
  background:var(--bg);
  background-image:
    radial-gradient(ellipse at 15% 0%,rgba(25,75,170,.38) 0,transparent 55%),
    radial-gradient(ellipse at 85% 100%,rgba(15,55,130,.3) 0,transparent 55%);
  color:var(--text);
  min-height:100svh;
  overflow-x:hidden;
}
.app{
  max-width:520px;
  margin:0 auto;
  padding:12px 16px 40px;
  display:flex;
  flex-direction:column;
  gap:14px;
}

/* ─── Nav ─── */
.nav{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 14px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  box-shadow:var(--shadow);
}
.nav-title{font-size:13px;font-weight:800;color:var(--text)}
.nav-link{
  font-size:12px;font-weight:700;
  color:var(--yellow);
  background:rgba(255,216,74,.1);
  border:1px solid rgba(255,216,74,.28);
  border-radius:999px;
  padding:5px 14px;
  text-decoration:none;
  transition:background .15s;
}
.nav-link:hover{background:rgba(255,216,74,.2)}

/* ─── Header ─── */
.hdr{text-align:center;padding:2px 0 0}
.hdr h1{
  font-size:clamp(22px,6.5vw,34px);
  font-weight:900;
  letter-spacing:-.02em;
  line-height:1.2;
}
.hdr h1 em{font-style:normal;color:var(--blue)}
.hdr p{color:var(--muted);font-size:13px;margin-top:6px;line-height:1.7}

/* ─── Avatar section ─── */
.ava-section{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
  position:relative;
}
.g-ava{
  width:140px;height:140px;
  display:flex;align-items:center;justify-content:center;
  animation:mochi 3s ease-in-out infinite;
  transform-origin:center bottom;
  filter:drop-shadow(0 6px 24px rgba(91,191,255,.45));
}
.g-ava img{width:100%;height:100%;object-fit:contain;pointer-events:none;user-select:none}
.g-ava.bounce{animation:gbounce .45s cubic-bezier(.34,1.56,.64,1)}
.g-ava.shake{animation:gshake .32s ease}
@keyframes mochi{
  0%,100%{transform:scale(1) translateY(0)}
  15%{transform:scaleX(1.07) scaleY(.92) translateY(4px)}
  35%{transform:scaleX(.94) scaleY(1.08) translateY(-7px)}
  55%{transform:scaleX(1.05) scaleY(.95) translateY(-3px)}
  75%{transform:scaleX(.97) scaleY(1.04) translateY(2px)}
}
@keyframes gbounce{
  0%{transform:scale(1)}
  35%{transform:scale(1.2,.85) translateY(6px)}
  60%{transform:scale(.9,1.12) translateY(-9px)}
  80%{transform:scale(1.05,.97)}
  100%{transform:scale(1)}
}
@keyframes gshake{
  0%,100%{transform:translateX(0) rotate(0)}
  20%{transform:translateX(-10px) rotate(-4deg)}
  50%{transform:translateX(10px) rotate(4deg)}
  70%{transform:translateX(-5px) rotate(-2deg)}
}
.mood-badge{
  font-size:13px;
  font-weight:700;
  color:var(--muted);
  background:rgba(0,0,0,.3);
  border:1px solid var(--border);
  border-radius:999px;
  padding:6px 18px;
  transition:color .3s,border-color .3s,background .3s;
}
.mood-badge.happy {color:#8ad4ff;border-color:rgba(91,191,255,.45);background:rgba(91,191,255,.1)}
.mood-badge.protest{color:#ff9090;border-color:rgba(255,114,114,.45);background:rgba(255,114,114,.1)}
.mood-badge.blush  {color:#ffb8cc;border-color:rgba(255,153,187,.45);background:rgba(255,153,187,.1)}

/* ─── Reaction particles ─── */
.particle{
  position:fixed;
  pointer-events:none;
  font-size:22px;
  animation:particleFly .7s ease-out forwards;
  z-index:99;
}
@keyframes particleFly{
  0%{transform:translate(0,0) scale(1);opacity:1}
  100%{transform:translate(var(--dx),var(--dy)) scale(.4);opacity:0}
}

/* ─── Speech bubble ─── */
.bubble{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:20px 20px 20px 6px;
  padding:18px 20px;
  font-size:17px;
  line-height:1.8;
  min-height:80px;
  transition:border-color .25s,background .25s;
  box-shadow:var(--shadow);
  position:relative;
}
.bubble::before{
  content:'💬';
  position:absolute;
  top:-10px;left:16px;
  font-size:16px;
  opacity:.5;
}
.bubble.happy  {border-color:rgba(91,191,255,.5);background:rgba(91,191,255,.07)}
.bubble.protest{border-color:rgba(255,114,114,.5);background:rgba(255,114,114,.07)}
.bubble.blush  {border-color:rgba(255,153,187,.45);background:rgba(255,153,187,.06)}

/* ─── Counters ─── */
.counters-wrap{display:flex;flex-direction:column;gap:8px}
.counters-lbl{
  font-size:11px;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;
  color:var(--dim);padding-left:2px;
  display:flex;align-items:center;justify-content:space-between;
}
.counters-reset{
  font-size:11px;font-weight:600;
  color:var(--dim);background:none;border:none;cursor:pointer;
  padding:2px 6px;border-radius:6px;
  transition:color .15s;
}
.counters-reset:hover{color:var(--muted)}
.counters{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cnt-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r-sm);
  padding:14px 12px;
  text-align:center;
  box-shadow:var(--shadow);
  transition:transform .15s;
}
.cnt-card.bump{animation:bump .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes bump{
  0%{transform:scale(1)}
  50%{transform:scale(1.12)}
  100%{transform:scale(1)}
}
.cnt-card b{display:block;font-size:38px;font-weight:900;line-height:1;margin-bottom:4px}
.cnt-card small{font-size:12px;color:var(--muted)}
.cnt-dog b{color:var(--red)}
.cnt-wolf b{color:var(--blue)}

/* ─── Button section card ─── */
.btn-section{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:16px;
  display:flex;
  flex-direction:column;
  gap:14px;
  box-shadow:var(--shadow);
}
.grp{display:flex;flex-direction:column;gap:8px}
.grp-lbl{
  font-size:11px;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;
  color:var(--dim);padding-left:2px;
}
.sep{height:1px;background:var(--border)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.g2>:last-child:nth-child(odd){grid-column:1/-1}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}

/* ─── Buttons ─── */
.btn{
  border:0;
  border-radius:var(--r-sm);
  padding:13px 10px;
  font-family:inherit;
  font-size:14px;
  font-weight:700;
  cursor:pointer;
  transition:transform .12s,opacity .12s;
  line-height:1.35;
  min-height:52px;
  touch-action:manipulation;
}
.btn:active{transform:scale(.94)}
.btn-dog {background:rgba(255,114,114,.14);color:#ff9090;border:1px solid rgba(255,114,114,.32)}
.btn-wolf{background:rgba(91,191,255,.12);color:var(--blue);border:1px solid rgba(91,191,255,.3)}
.btn-kind{background:rgba(124,255,178,.1);color:var(--green);border:1px solid rgba(124,255,178,.26)}

/* ─── Input area ─── */
.inp-area{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:10px;
  box-shadow:var(--shadow);
}
.inp-lbl{
  font-size:12px;font-weight:700;
  color:var(--muted);
}
.inp-row{display:flex;gap:8px}
.inp{
  flex:1;
  min-width:0;
  background:rgba(0,0,0,.32);
  border:1px solid var(--border);
  border-radius:var(--r-sm);
  color:var(--text);
  font-size:16px;
  font-family:inherit;
  padding:13px 16px;
  outline:none;
  transition:border-color .2s;
  min-height:50px;
}
.inp:focus{border-color:rgba(91,191,255,.55)}
.inp::placeholder{color:var(--dim)}
.btn-send{
  background:var(--yellow);color:#1a1000;
  font-size:15px;font-weight:800;padding:13px 20px;
  border-radius:var(--r-sm);border:none;cursor:pointer;
  min-height:50px;touch-action:manipulation;
  transition:transform .12s,opacity .12s;
  white-space:nowrap;
}
.btn-send:active{transform:scale(.94)}
.btn-hint{
  background:rgba(91,191,255,.1);color:var(--blue);
  border:1px solid rgba(91,191,255,.25);
  padding:13px 14px;border-radius:var(--r-sm);
  font-size:13px;font-weight:700;cursor:pointer;
  min-height:50px;touch-action:manipulation;
  transition:transform .12s;white-space:nowrap;
  font-family:inherit;
}
.btn-hint:active{transform:scale(.94)}
.hint-strip{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:6px;
}
.hint-chip{
  background:rgba(0,0,0,.18);
  color:var(--muted);
  border:1px solid var(--border);
  border-radius:999px;
  min-height:34px;
  padding:6px 8px;
  font-family:inherit;
  font-size:12px;
  font-weight:700;
  cursor:pointer;
  touch-action:manipulation;
  transition:transform .12s,border-color .15s,color .15s;
  white-space:nowrap;
}
.hint-chip:hover{color:var(--text);border-color:rgba(91,191,255,.35)}
.hint-chip:active{transform:scale(.94)}
@media(max-width:430px){
  .app{padding-left:12px;padding-right:12px}
  .nav{align-items:flex-start;gap:8px;flex-direction:column}
  .inp-row{display:grid;grid-template-columns:1fr auto}
  .btn-hint{grid-column:1/-1}
  .hint-strip{grid-template-columns:repeat(3,1fr)}
  .counters-lbl{align-items:flex-start;gap:6px;flex-direction:column}
}

/* ─── Log ─── */
.log-wrap{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  overflow:hidden;
  box-shadow:var(--shadow);
}
.log-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px 0;
}
.log-lbl{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--dim)}
.log-clear{font-size:11px;font-weight:600;color:var(--dim);background:none;border:none;cursor:pointer;transition:color .15s}
.log-clear:hover{color:var(--muted)}
.log{
  max-height:160px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:4px;
  padding:10px 12px 12px;
  scrollbar-width:thin;
  scrollbar-color:var(--border) transparent;
}
.li{
  font-size:13px;
  color:var(--muted);
  padding:7px 10px;
  border-radius:8px;
  line-height:1.5;
  animation:liIn .25s ease;
}
.li-wolf{background:rgba(91,191,255,.1);color:#8ad4ff}
.li-dog{background:rgba(255,114,114,.1);color:#ff9090}
.li-reply{
  font-size:12px;
  color:var(--dim);
  padding:4px 10px 6px 18px;
  border-left:2px solid rgba(80,160,255,.2);
  margin-left:8px;
  border-radius:0 6px 6px 0;
}
@keyframes liIn{
  from{opacity:0;transform:translateY(-4px)}
  to{opacity:1;transform:translateY(0)}
}

/* ─── Trial badge ─── */
.trial-banner{
  display:flex;align-items:center;gap:10px;
  background:rgba(255,216,74,.06);
  border:1px solid rgba(255,216,74,.22);
  border-radius:var(--r);
  padding:12px 16px;
  text-decoration:none;
  transition:background .15s;
}
.trial-banner:hover{background:rgba(255,216,74,.1)}
.trial-banner-ico{font-size:22px}
.trial-banner-text{flex:1}
.trial-banner-title{font-size:13px;font-weight:800;color:var(--yellow);margin-bottom:2px}
.trial-banner-desc{font-size:11px;color:var(--muted);line-height:1.5}
.trial-banner-arrow{font-size:16px;color:var(--yellow);opacity:.6}
</style>
</head>
<body>
<div class="app">

  <nav class="nav">

    "わんこ……おおかみって言ってほしいんだけどな。でも、構ってくれてうれしい。",
    "わんこはちがうよ。おおかみって呼んで。……ちょっと照れてるけど。",
    "わんこって言われると、なんかこそばゆいんだな。おおかみだよ。",
  ],
  koinu:[
    "こいぬ！？ こいぬって言った！？ ちがう！ おおかみだよ！ ……でもちょっとうれしい。",
    "子犬は余計だよ。大きくて立派なおおかみなんだからね。……ちょっとうれしいけど。",
    "こ、子犬って……！ おおかみです！ ぼくはおおかみ！ ……なんかうれしくなってるの内緒。",
    "子犬言うのやめて。……でも構ってくれてるのはうれしいよ。おおかみだけど。",
  ],
  superDog:[
    "どう見てもいぬって言った？ ち、ちがうよ。おおかみだよ……！",
    "どう見てもいぬ、は余計だよ。おおかみとして見てほしいな。……うれしいけど。",
    "そんなに言う？ ぼく、ちゃんとおおかみだよ。……構ってくれてうれしいけど。",
    "どう見てもって……見方が足りないよ。青い毛のおおかみなんだから。",
    "どう見てもって言っちゃうんだ。おおかみなのに。……まあ、うれしいけど。",
  ],
  petting:[
    "わっ、なでなで。……うれしい。ぼく、これ好き。",
    "えへ、撫でてくれてありがとう。ちょっと得意がになっちゃう。",
    "なでなで……ぼく、なでられるの大好きなんだよね。",
    "うれしい。でもそれはそれとして、ぼくはおおかみだよ。",
    "……得意げ。ぼく、こういうの好き。えへへ。",
  ],
  kawaii:[
    "か、かわいいって言ってくれた？ ……えへへ、うれしい。",
    "ぼく、かわいいの？ ……照れる。でもうれしい。",
    "えへ、ありがとう。おおかみでもかわいいと思ってくれるんだね。",
    "かわいいって言われると、なんか照れくさいよ。えへへ。",
  ],
  name:[
    "え、名前呼んでくれた？ ……うれしい。ガウルくんだよ。えへへ。",
    "ガウルくんって呼んでくれてありがとう。うれしいな。",
    "呼んでくれた。ぼくはガウルくん、おおかみだよ。",
    "名前呼んでくれると、ちょっとテンション上がる。えへ。",
  ],
  hint:[
    "『おおかみ』って呼んでくれると、ぼくすごくうれしいよ。",
    "『わんこ』とか『子犬』って言われると、むぅってなるよ。……でも構ってくれるのはうれしい。",
    "『なでなで』や『もふもふ』も分かるよ。ぼく、そういうの好き。",
    "『かわいい』って言われると照れるよ。おおかみだけど。",
    "自由入力でも『青いおおかみ』『どう見てもいぬ』みたいな言葉を拾えるよ。",
  ],
  neutral:[
    "えっと……おおかみって言ってみて？",
    "ガウルくんのことなんて呼ぶ？ 答えは『おおかみ』だよ。",
    "ぼくはおおかみだよ。ちゃんと呼んでくれたらうれしいな。",
    "なんでも話しかけてくれていいよ。でもおおかみって言ってほしい。",
  ],
};

function norm(s){
  return s.toLowerCase()
    .replace(/\s/g,'')
    .replace(/[!！?？。．、,・]/g,'')
    .replace(/狼|オオカミ|おーかみ|おぅかみ|おうかみ/g,'おおかみ')
    .replace(/イヌ|犬/g,'いぬ')
    .replace(/ワンチャン/g,'わんちゃん')
    .replace(/ワンワン/g,'わんわん')
    .replace(/ワンコ/g,'わんこ')
    .replace(/小犬|こいぬ|コイヌ/g,'子犬')
    .replace(/ガウル|がうるくん/g,'がうる');
}

function detect(raw){
  const s=norm(raw);
  if(/なでなで|なで|ぽんぽん|よしよし|もふもふ|ふわふわ/.test(s)) return 'petting';
  if(/かわいい|かわいすぎ/.test(s)) return 'kawaii';
  if(s.includes('がうる')) return 'name';
  if(/どう見ても|どうみても/.test(s)) return 'superDog';
  if(s.includes('わんちゃん')) return 'wanchan';
  if(s.includes('わんわん')) return 'wanwan';
  if(s.includes('わんこ')) return 'wanko';
  if(/子犬|こいぬ/.test(s)) return 'koinu';
  if(s.includes('いぬ')) return 'inu';
  if(s.includes('おおかみ')) return 'wolf';
  return 'neutral';
}

function process(raw){
  if(!raw.trim()) return;
  const kw=detect(raw);
  const dogKws=['inu','wanchan','wanwan','wanko','koinu','superDog'];
  let reply='', mood='';
  if(kw==='wolf'){
    wolfCnt++;
    reply=rand(D.wolf); mood='happy';
    speak(reply,mood); ava('bounce');
    bumpCard('cardWolf');
    addLog(raw,'wolf',reply);
  } else if(dogKws.includes(kw)){
    dogCnt++;
    reply=rand(D[kw]); mood='protest';
    speak(reply,mood); ava('shake');
    bumpCard('cardDog');
    addLog(raw,'dog',reply);
  } else if(kw==='petting'){
    reply=rand(D.petting); mood='happy';
    speak(reply,mood); ava('bounce');
    addLog(raw,'',reply);
  } else if(kw==='kawaii'){
    reply=rand(D.kawaii); mood='blush';
    speak(reply,mood); ava('bounce');
    addLog(raw,'',reply);
  } else if(kw==='name'){
    reply=rand(D.name); mood='happy';
    speak(reply,mood); ava('bounce');
    addLog(raw,'',reply);
  } else {
    reply=rand(D.neutral); mood='';
    speak(reply,mood);
    addLog(raw,'',reply);
  }
  $('cntDog').textContent=dogCnt;
  $('cntWolf').textContent=wolfCnt;
}

function speak(text,mood){
  bubble.textContent=text;
  bubble.className='bubble'+(mood?' '+mood:'');
  const m={happy:'😊 うれしい',protest:'😤 おおかみだもん！',blush:'😳 照れてる','':'🐺 通常モード'};
  const badge=gMood;
  badge.textContent=m[mood]??'🐺 通常モード';
  badge.className='mood-badge'+(mood?' '+mood:'');
}

function ava(anim){
  gAva.classList.remove('bounce','shake');
  void gAva.offsetWidth;
  if(anim) gAva.classList.add(anim);
  setTimeout(()=>gAva.classList.remove('bounce','shake'),500);
}

function bumpCard(id){
  const el=$(id);
  el.classList.remove('bump');
  void el.offsetWidth;
  el.classList.add('bump');
}

function spawnParticle(btn, emoji){
  const r=btn.getBoundingClientRect();
  const p=document.createElement('div');
  p.className='particle';
  p.textContent=emoji;
  const dx=(Math.random()-0.5)*80;
  const dy=-60-Math.random()*40;
  p.style.cssText=`left:${r.left+r.width/2}px;top:${r.top}px;--dx:${dx}px;--dy:${dy}px`;
  document.body.appendChild(p);
  setTimeout(()=>p.remove(),750);
}

function addLog(input, type, reply){
  const wrapper=document.createElement('div');

  const el=document.createElement('div');
  el.textContent=`「${input}」`;
  el.className='li'+(type==='wolf'?' li-wolf':type==='dog'?' li-dog':'');
  wrapper.appendChild(el);

  if(reply){
    const rep=document.createElement('div');
    rep.textContent=reply;
    rep.className='li-reply';
    wrapper.appendChild(rep);
  }

  logArea.prepend(wrapper);
  while(logArea.children.length>20) logArea.removeChild(logArea.lastChild);
}

function sayBtn(btn, t){
  const isDog=['いぬ','わんちゃん','わんわん','わんこ','子犬','どう見てもいぬ'].includes(t);
  const isWolf=['おおかみ','青いおおかみ','おおかみだよね'].includes(t);
  const emoji=isDog?'🐕':isWolf?'🐺':t==='なでなで'?'✋':t==='かわいい'?'💕':'✨';
  spawnParticle(btn, emoji);
  process(t);
}
function doSend(){
  const v=freeInp.value.trim();
  if(!v) return;
  process(v); freeInp.value='';
}
function doHint(){
  const reply=D.hint[hintIndex%D.hint.length];
  hintIndex++;
  speak(reply,'');
  addLog('ヒント','',reply);
}
function resetCounters(){
  dogCnt=0; wolfCnt=0;
  $('cntDog').textContent='0';
  $('cntWolf').textContent='0';
}
function clearLog(){
  logArea.innerHTML='<div class="li">— ガウルくんとのやりとり —</div>';
}
function rand(a){ return a[Math.floor(Math.random()*a.length)]; }
freeInp.addEventListener('keydown',e=>{ if(e.key==='Enter') doSend(); });
</script>
