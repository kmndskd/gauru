<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ガウルくんはおおかみ</title>
<style>
:root{
  --bg:#08121f;
  --card:#0f1e35;
  --card2:#162540;
  --border:rgba(80,150,255,.13);
  --blue:#4db8ff;
  --yellow:#ffd84a;
  --green:#7cffb2;
  --red:#ff7272;
  --pink:#ff99bb;
  --text:#e8f2ff;
  --muted:#7a9ccc;
  --dim:#3a5a84;
  --r:14px;
  --r-sm:10px;
  --shadow:0 12px 40px rgba(0,0,0,.45);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Hiragino Sans",sans-serif;
  background:var(--bg);
  background-image:
    radial-gradient(ellipse at 15% 0%,rgba(25,75,170,.35) 0,transparent 55%),
    radial-gradient(ellipse at 85% 100%,rgba(15,55,130,.28) 0,transparent 55%);
  color:var(--text);
  min-height:100svh;
  overflow-x:hidden;
}
/* ── Layout ── */
.app{
  max-width:1080px;
  margin:0 auto;
  padding:16px;
  display:flex;
  flex-direction:column;
  gap:14px;
  min-height:100svh;
}
/* ── Header ── */
.hdr{text-align:center;padding:18px 8px 4px}
.hdr-badge{
  display:inline-block;
  background:rgba(77,184,255,.1);
  border:1px solid rgba(77,184,255,.28);
  color:var(--blue);
  border-radius:999px;
  padding:5px 14px;
  font-size:11px;
  font-weight:700;
  letter-spacing:.08em;
  text-transform:uppercase;
  margin-bottom:10px;
}
.hdr h1{
  font-size:clamp(22px,5vw,42px);
  font-weight:900;
  line-height:1.1;
  letter-spacing:-.02em;
}
.hdr h1 em{font-style:normal;color:var(--blue)}
.hdr p{color:var(--muted);font-size:13px;margin-top:8px;line-height:1.7}
/* ── Stats row ── */
.stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}
.scard{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r-sm);
  padding:12px 8px;
  text-align:center;
}
.scard b{font-size:26px;font-weight:900;display:block;line-height:1}
.scard small{font-size:11px;color:var(--muted);display:block;margin-top:4px}
.s-wolf b{color:var(--blue)}
.s-combo b{color:var(--green)}
.s-dog b{color:var(--red)}
.s-phase b{font-size:14px;color:var(--yellow)}
/* ── Gauge ── */
.gauge-wrap{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r-sm);
  padding:14px 16px;
}
.gauge-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:8px;
  font-size:13px;
}
.gauge-head span:first-child{font-weight:700;color:var(--blue)}
.phase-dots{display:flex;gap:6px;align-items:center}
.pdot{
  width:9px;height:9px;
  border-radius:50%;
  background:var(--surface2);
  border:1px solid var(--border);
  transition:.3s;
}
.pdot.done{background:var(--blue);border-color:var(--blue)}
.pdot.now{background:var(--yellow);border-color:var(--yellow);box-shadow:0 0 8px rgba(255,216,74,.5)}
.gauge-track{
  height:14px;
  background:rgba(0,0,0,.35);
  border-radius:999px;
  overflow:hidden;
}
.gauge-bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,var(--blue),var(--green),var(--yellow));
  border-radius:999px;
  transition:width .55s cubic-bezier(.34,1.56,.64,1);
}
.gauge-labels{
  display:flex;
  justify-content:space-between;
  margin-top:5px;
  padding:0 2px;
}
.gauge-labels span{font-size:10px;color:var(--dim)}
/* ── Main grid ── */
.main{
  display:grid;
  gap:14px;
  grid-template-columns:1fr;
  flex:1;
}
@media(min-width:800px){
  .main{grid-template-columns:280px 1fr}
}
/* ── Gauru panel ── */
.gp{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:20px 18px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:14px;
}
.g-ava{
  width:120px;height:120px;
  display:flex;align-items:center;justify-content:center;
  animation:mochi 3s ease-in-out infinite;
  transform-origin:center bottom;
}
.g-ava img{
  width:100%;height:100%;
  object-fit:contain;
  filter:drop-shadow(0 4px 18px rgba(77,184,255,.35)) drop-shadow(0 2px 6px rgba(0,0,0,.5));
  pointer-events:none;
  user-select:none;
}
.g-ava.bounce{animation:bounce .45s cubic-bezier(.34,1.56,.64,1)}
.g-ava.shake{animation:shakex .3s ease}
@keyframes mochi{
  0%,100%{transform:scale(1,1) translateY(0)}
  15%{transform:scaleX(1.07) scaleY(0.92) translateY(4px)}
  35%{transform:scaleX(0.94) scaleY(1.08) translateY(-7px)}
  55%{transform:scaleX(1.05) scaleY(0.95) translateY(-3px)}
  75%{transform:scaleX(0.97) scaleY(1.04) translateY(2px)}
  90%{transform:scaleX(1.02) scaleY(0.99) translateY(1px)}
}
@keyframes bounce{0%{transform:scale(1)}40%{transform:scale(1.18,.88) translateY(5px)}65%{transform:scale(.92,1.1) translateY(-8px)}80%{transform:scale(1.05,.97)}100%{transform:scale(1)}}
@keyframes shakex{0%,100%{transform:translateX(0)}20%{transform:translateX(-9px) rotate(-3deg)}50%{transform:translateX(9px) rotate(3deg)}70%{transform:translateX(-5px) rotate(-1deg)}}
.g-mood{
  font-size:12px;
  color:var(--muted);
  background:rgba(0,0,0,.25);
  border-radius:999px;
  padding:4px 12px;
}
.g-name{text-align:center}
.g-name h2{font-size:18px;font-weight:800}
.g-name p{font-size:12px;color:var(--muted);margin-top:3px}
.g-tags{display:flex;flex-wrap:wrap;gap:5px;justify-content:center}
.tag{
  font-size:10px;
  background:rgba(77,184,255,.09);
  border:1px solid rgba(77,184,255,.2);
  color:var(--blue);
  border-radius:999px;
  padding:3px 9px;
}
.g-prof{
  width:100%;
  background:rgba(0,0,0,.2);
  border-radius:var(--r-sm);
  padding:12px;
  font-size:12px;
  color:var(--muted);
  line-height:1.75;
}
.g-prof b{
  display:block;
  font-size:10px;
  font-weight:700;
  letter-spacing:.06em;
  text-transform:uppercase;
  color:var(--dim);
  margin-bottom:6px;
}
/* ── Achievements ── */
.ach-wrap{width:100%}
.ach-wrap>b{
  display:block;
  font-size:10px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.06em;
  color:var(--dim);
  margin-bottom:8px;
}
.ach-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:5px;
}
.ach{
  background:rgba(0,0,0,.2);
  border:1px solid rgba(255,255,255,.05);
  border-radius:8px;
  padding:8px 4px;
  text-align:center;
  font-size:18px;
  opacity:.28;
  transition:.4s;
  cursor:default;
  position:relative;
}
.ach small{display:block;font-size:9px;color:var(--muted);margin-top:3px;line-height:1.3}
.ach.got{
  opacity:1;
  background:rgba(255,216,74,.07);
  border-color:rgba(255,216,74,.22);
  animation:achPop .4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes achPop{0%{transform:scale(.85)}100%{transform:scale(1)}}
/* ── Chat area ── */
.chat{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:20px 18px;
  display:flex;
  flex-direction:column;
  gap:16px;
}
/* ── Dialogue bubble ── */
.sec-lbl{
  font-size:10px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.07em;
  color:var(--dim);
  margin-bottom:8px;
}
.bubble{
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:20px 20px 20px 5px;
  padding:18px 20px;
  font-size:17px;
  line-height:1.75;
  min-height:76px;
  transition:border-color .25s,background .25s;
}
.bubble.happy{border-color:rgba(77,184,255,.4);background:rgba(77,184,255,.05)}
.bubble.protest{border-color:rgba(255,114,114,.3);background:rgba(255,114,114,.04)}
.bubble.blush{border-color:rgba(255,153,187,.3);background:rgba(255,153,187,.04)}
.bubble.excited{border-color:rgba(255,216,74,.38);background:rgba(255,216,74,.05)}
/* ── Free input ── */
.inp-row{display:flex;gap:8px}
.inp{
  flex:1;
  background:rgba(0,0,0,.3);
  border:1px solid var(--border);
  border-radius:var(--r-sm);
  color:var(--text);
  font-size:15px;
  font-family:inherit;
  padding:13px 15px;
  outline:none;
  transition:border-color .2s;
}
.inp:focus{border-color:rgba(77,184,255,.5)}
.inp::placeholder{color:var(--dim)}
/* ── Buttons ── */
.btn{
  border:0;
  border-radius:var(--r-sm);
  padding:12px 10px;
  font-size:13px;
  font-weight:700;
  cursor:pointer;
  transition:transform .12s,opacity .12s;
  font-family:inherit;
  line-height:1.3;
  white-space:nowrap;
}
.btn:active{transform:scale(.95)}
.btn-primary{background:var(--yellow);color:#18100a;font-size:14px}
.btn-sub{background:rgba(77,184,255,.12);color:var(--blue);border:1px solid rgba(77,184,255,.22)}
.btn-dog{background:rgba(255,114,114,.1);color:#ff9090;border:1px solid rgba(255,114,114,.22)}
.btn-wolf{background:rgba(77,184,255,.1);color:var(--blue);border:1px solid rgba(77,184,255,.22)}
.btn-kind{background:rgba(124,255,178,.09);color:var(--green);border:1px solid rgba(124,255,178,.2)}
.btn-topic{background:rgba(255,216,74,.08);color:var(--yellow);border:1px solid rgba(255,216,74,.18)}
/* ── Choice sections ── */
.choices{display:flex;flex-direction:column;gap:12px}
.choice-group{display:flex;flex-direction:column}
.cg-lbl{font-size:10px;color:var(--dim);margin-bottom:6px;font-weight:600}
.cgrid{display:grid;gap:7px}
.cg2{grid-template-columns:1fr 1fr}
.cg3{grid-template-columns:1fr 1fr 1fr}
.cg4{grid-template-columns:1fr 1fr 1fr 1fr}
@media(max-width:480px){
  .cg4{grid-template-columns:1fr 1fr}
  .cg3{grid-template-columns:1fr 1fr}
}
/* ── Divider ── */
hr{border:none;height:1px;background:var(--border);margin:2px 0}
/* ── Log ── */
.log{
  max-height:130px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:3px;
  scrollbar-width:thin;
  scrollbar-color:var(--border) transparent;
}
.li{
  font-size:12px;
  color:var(--muted);
  padding:3px 7px;
  border-radius:6px;
  animation:liIn .25s ease;
}
.li-good{background:rgba(77,184,255,.07);color:#8ad4ff}
.li-dog{background:rgba(255,114,114,.07);color:#ff9090}
.li-sp{background:rgba(255,216,74,.06);color:#ffe080}
@keyframes liIn{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:translateY(0)}}
/* ── Toast ── */
.toast{
  position:fixed;
  top:18px;right:18px;
  background:linear-gradient(135deg,rgba(22,52,110,.97),rgba(14,32,74,.97));
  border:1px solid rgba(255,216,74,.38);
  border-radius:var(--r);
  padding:13px 18px;
  display:flex;align-items:center;gap:12px;
  z-index:300;
  transform:translateX(130%);
  transition:transform .4s cubic-bezier(.34,1.56,.64,1);
  max-width:270px;
  box-shadow:var(--shadow);
}
.toast.show{transform:translateX(0)}
.toast-icon{font-size:22px}
.toast-txt b{display:block;font-size:10px;color:var(--yellow);font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:2px}
.toast-txt span{font-size:13px;color:var(--text)}
/* ── Win overlay ── */
.win{
  position:fixed;inset:0;
  background:rgba(0,0,0,.82);
  backdrop-filter:blur(10px);
  z-index:500;
  display:none;
  place-items:center;
  padding:20px;
}
.win.show{display:grid}
.win-card{
  background:linear-gradient(160deg,var(--surface2),var(--surface));
  border:1px solid rgba(255,216,74,.28);
  border-radius:24px;
  padding:38px 28px;
  max-width:500px;
  width:100%;
  text-align:center;
  box-shadow:0 40px 100px rgba(0,0,0,.55);
  animation:winPop .55s cubic-bezier(.34,1.56,.64,1);
}
@keyframes winPop{from{transform:scale(.82);opacity:0}to{transform:scale(1);opacity:1}}
.win-emo{font-size:56px;margin-bottom:14px}
.win-ttl{font-size:clamp(26px,7vw,50px);font-weight:900;color:var(--yellow);line-height:1.1;margin-bottom:10px}
.win-sub{font-size:17px;font-weight:700;margin-bottom:10px}
.win-txt{color:var(--muted);font-size:13px;line-height:1.8;margin-bottom:24px}
.win-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px}
.wst{background:rgba(0,0,0,.2);border-radius:var(--r-sm);padding:12px}
.wst b{display:block;font-size:22px;font-weight:900;color:var(--blue)}
.wst span{font-size:10px;color:var(--muted)}
/* ── Gauru center ── */
.gauru-center{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
}
.g-ava{
  width:150px;height:150px;
  display:flex;align-items:center;justify-content:center;
  animation:mochi 3s ease-in-out infinite;
  transform-origin:center bottom;
}
.g-ava img{
  width:100%;height:100%;
  object-fit:contain;
  filter:drop-shadow(0 6px 22px rgba(77,184,255,.4)) drop-shadow(0 2px 8px rgba(0,0,0,.5));
  pointer-events:none;
  user-select:none;
}
.g-ava.bounce{animation:gbounce .45s cubic-bezier(.34,1.56,.64,1)}
.g-ava.shake{animation:gshake .32s ease}
@keyframes mochi{
  0%,100%{transform:scale(1,1) translateY(0)}
  15%{transform:scaleX(1.07) scaleY(0.92) translateY(4px)}
  35%{transform:scaleX(0.94) scaleY(1.08) translateY(-7px)}
  55%{transform:scaleX(1.05) scaleY(0.95) translateY(-3px)}
  75%{transform:scaleX(0.97) scaleY(1.04) translateY(2px)}
  90%{transform:scaleX(1.02) scaleY(0.99) translateY(1px)}
}
@keyframes gbounce{
  0%{transform:scale(1)}
  35%{transform:scale(1.2,.85) translateY(6px)}
  60%{transform:scale(.9,1.12) translateY(-9px)}
  80%{transform:scale(1.06,.96)}
  100%{transform:scale(1)}
}
@keyframes gshake{
  0%,100%{transform:translateX(0) rotate(0)}
  20%{transform:translateX(-10px) rotate(-4deg)}
  50%{transform:translateX(10px) rotate(4deg)}
  70%{transform:translateX(-5px) rotate(-2deg)}
}
.mood-badge{
  font-size:13px;
  color:var(--muted);
  background:rgba(0,0,0,.28);
  border-radius:999px;
  padding:5px 14px;
  border:1px solid var(--border);
}
/* ── Dialogue bubble ── */
.bubble{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:20px 20px 20px 6px;
  padding:20px 22px;
  font-size:18px;
  line-height:1.75;
  min-height:80px;
  transition:border-color .25s,background .25s;
}
.bubble.happy{border-color:rgba(77,184,255,.45);background:rgba(77,184,255,.06)}
.bubble.protest{border-color:rgba(255,114,114,.38);background:rgba(255,114,114,.05)}
.bubble.blush{border-color:rgba(255,153,187,.35);background:rgba(255,153,187,.05)}
/* ── Counters ── */
.counters{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.cnt-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:14px;
  text-align:center;
}
.cnt-card b{display:block;font-size:30px;font-weight:900;line-height:1}
.cnt-card small{display:block;font-size:11px;color:var(--muted);margin-top:5px}
.cnt-dog b{color:var(--red)}
.cnt-wolf b{color:var(--blue)}
/* ── Button area ── */
.btn-area{display:flex;flex-direction:column;gap:12px}
.btn-group-label{
  font-size:11px;
  font-weight:700;
  color:var(--dim);
  letter-spacing:.06em;
  text-transform:uppercase;
  margin-bottom:7px;
}
.btn-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
}
@media(max-width:400px){
  .btn-grid{grid-template-columns:repeat(2,1fr)}
}
.btn{
  border:0;
  border-radius:12px;
  padding:13px 8px;
  font-size:14px;
  font-weight:700;
  font-family:inherit;
  cursor:pointer;
  transition:transform .12s;
  line-height:1.3;
}
.btn:active{transform:scale(.94)}
.btn-dog{background:rgba(255,114,114,.12);color:#ff9090;border:1px solid rgba(255,114,114,.25)}
.btn-wolf{background:rgba(77,184,255,.12);color:var(--blue);border:1px solid rgba(77,184,255,.25)}
.btn-kind{background:rgba(124,255,178,.1);color:var(--green);border:1px solid rgba(124,255,178,.22)}
.btn-send{background:var(--yellow);color:#1a1000;font-size:15px;font-weight:800}
.btn-hint{background:rgba(77,184,255,.12);color:var(--blue);border:1px solid rgba(77,184,255,.25)}
/* ── Input ── */
.inp-row{display:flex;gap:8px}
.inp{
  flex:1;
  background:rgba(0,0,0,.3);
  border:1px solid var(--border);
  border-radius:12px;
  color:var(--text);
  font-size:16px;
  font-family:inherit;
  padding:14px 16px;
  outline:none;
  transition:border-color .2s;
}
.inp:focus{border-color:rgba(77,184,255,.5)}
.inp::placeholder{color:var(--dim)}
/* ── Log ── */
.log{
  max-height:100px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:3px;
  scrollbar-width:thin;
  scrollbar-color:var(--border) transparent;
}
.li{font-size:12px;color:var(--muted);padding:3px 8px;border-radius:6px;animation:liIn .2s ease}
.li-dog{background:rgba(255,114,114,.07);color:#ff9090}
.li-wolf{background:rgba(77,184,255,.07);color:#8ad4ff}
@keyframes liIn{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:translateY(0)}}
.divider{height:1px;background:var(--border)}
/* ── Layout ── */
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:system-ui,-apple-system,"Hiragino Sans",sans-serif;
  background:var(--bg);
  background-image:
    radial-gradient(ellipse at 20% 0%,rgba(25,75,170,.35) 0,transparent 55%),
    radial-gradient(ellipse at 80% 100%,rgba(15,55,130,.28) 0,transparent 55%);
  color:var(--text);
  min-height:100svh;
  overflow-x:hidden;
}
.app{
  max-width:560px;
  margin:0 auto;
  padding:20px 16px;
  display:flex;
  flex-direction:column;
  gap:16px;
}
.hdr{text-align:center;padding-top:8px}
.hdr h1{font-size:clamp(24px,6vw,38px);font-weight:900;letter-spacing:-.02em}
.hdr h1 em{font-style:normal;color:var(--blue)}
.hdr p{color:var(--muted);font-size:13px;margin-top:6px;line-height:1.6}
@media(max-width:420px){
  .app{padding:14px 12px}
}
</style>
</head>
<body>
<div class="app">

<header class="hdr">
  <h1>ガウルくんは<em>おおかみ</em></h1>
  <p>いぬ系の言葉で呼ぶとガウルくんが怒るよ（うれしそうに）。<br>『おおかみ』って言ってあげてね。</p>
</header>

<div class="gauru-center">
  <div class="g-ava" id="gAva"><img src="gauru-head.png" alt="ガウルくん"></div>
  <div class="mood-badge" id="gMood">🐺 通常モード</div>
</div>

<div class="bubble" id="bubble">ガウルくんだよ。えっと……なんて呼んでくれる？</div>

<div class="counters">
  <div class="cnt-card cnt-dog">
    <b id="cntDog">0</b>
    <small>いぬって言った回数</small>
  </div>
  <div class="cnt-card cnt-wolf">
    <b id="cntWolf">0</b>
    <small>おおかみって言った回数</small>
  </div>
</div>

<div class="btn-area">
  <div>
    <div class="btn-group-label">🐕 いぬ系で呼ぶ</div>
    <div class="btn-grid">
      <button class="btn btn-dog" onclick="say('いぬ')">いぬ</button>
      <button class="btn btn-dog" onclick="say('わんちゃん')">わんちゃん</button>
      <button class="btn btn-dog" onclick="say('わんわん')">わんわん</button>
      <button class="btn btn-dog" onclick="say('わんこ')">わんこ</button>
      <button class="btn btn-dog" onclick="say('子犬')">子犬</button>
      <button class="btn btn-dog" onclick="say('どう見てもいぬ')">どう見てもいぬ</button>
    </div>
  </div>
  <div class="divider"></div>
  <div>
    <div class="btn-group-label">🐺 ちゃんと呼ぶ</div>
    <div class="btn-grid">
      <button class="btn btn-wolf" onclick="say('おおかみ')">おおかみ</button>
      <button class="btn btn-wolf" onclick="say('青いおおかみ')">青いおおかみ</button>
      <button class="btn btn-wolf" onclick="say('おおかみだよね')">おおかみだよね？</button>
    </div>
  </div>
  <div class="divider"></div>
  <div>
    <div class="btn-group-label">💬 話しかける</div>
    <div class="btn-grid">
      <button class="btn btn-kind" onclick="say('なでなで')">なでなで</button>
      <button class="btn btn-kind" onclick="say('かわいい')">かわいい</button>
      <button class="btn btn-kind" onclick="say('ガウルくん')">ガウルくん</button>
    </div>
  </div>
</div>

<div class="inp-row">
  <input class="inp" id="freeInp" type="text" placeholder="なんでも話しかけてみて…">
  <button class="btn btn-send" onclick="doSend()">送る</button>
  <button class="btn btn-hint" onclick="doHint()">？</button>
</div>

<div class="divider"></div>
<div class="log" id="logArea"><div class="li">— ガウルくんとのやりとり —</div></div>

</div>
<script>
let dogCnt=0, wolfCnt=0;
const $=id=>document.getElementById(id);
const bubble=$('bubble'), gAva=$('gAva'), gMood=$('gMood');
const logArea=$('logArea'), freeInp=$('freeInp');

const D={
  wolf:[
    "……っ、ありがとう。おおかみって呼んでくれて、うれしいよ。",
    "えへへ。おおかみって言ってくれるの、ちゃんと聞こえたよ。",
    "そう、おおかみ。なんか照れるけど……うれしい。",
    "ちゃんと言えてるよ。ガウルくんは、おおかみ。",
    "おおかみって言ってくれると、なんか安心するよ。ありがとう。",
    "そうそう、青い毛のおおかみだよ。ちゃんと分かってくれてる。",
    "うん、おおかみ。……ちょっと得意がになっちゃう。",
    "ぼく、おおかみで合ってるよ。えへ。",
    "おおかみって呼ばれると、なんかやる気が出るんだよね。",
    "そう！ ガウルくんはおおかみ！ ……えへへ。",
  ],
  inu:[
    "いぬ……うーん、そうじゃないんだけどな。おおかみ、だよ。",
    "ち、ちがうよ。いぬって言わないで。おおかみなんだよ。",
    "む、むぅ。いぬじゃないもん。おおかみだもん。",
    "いぬって呼ばれるのは、なんかこそばゆいよ。ほんとはおおかみだから。",
    "うーん……おおかみって呼んでくれると、もっとうれしいのに。",
    "いぬっぽいのは分かってるよ。でも……おおかみなんだよね。",
    "べつに怒ってないけど……おおかみって呼んでくれると、もっとうれしいな。",
    "構ってくれるのはうれしいけど、おおかみって呼んでくれると、もっとうれしいよ。",
    "えー、いぬじゃないよ。耳とかマズルとか、おおかみっぽいと思うんだけどな。",
  ],
  wanchan:[
    "わんちゃんって……！ ちがう、おおかみだよ！ ……でもなんかこそばゆい。",
    "わ、わんちゃんって呼ばないで！ おおかみだからね。えへ……じゃなくて！",
    "わんちゃんって言うたびに、むぅってなるよ。おおかみって呼んで。……でもうれしい。",
    "わんちゃん……おおかみだよ。おおかみ。……なんかこそばゆいな。",
    "わんちゃんはちがうよ！ ぼくはおおかみ！ ……構ってもらえてうれしいけど。",
  ],
  wanwan:[
    "わんわんって言った！？ ぼ、ぼくはおおかみだよ！ わんわん言わないで！",
    "わんわん……！ それはちょっとかわいすぎるよ。ちがうから。おおかみだから。",
    "わんわんはさすがにちがうよ！ ……でも構ってもらえてうれしいのは本当。",
    "わんわんって……！ もう！ おおかみって言って！ ……うれしいけど。",
    "わんわん言わないでよ。おおかみだよ。……ちょっとうれしかったけど。",
  ],
  wanko:[
    "わんこって言った。……むぅ。おおかみだよ。おおかみ。",
    "わんこ……おおかみって言ってほしいんだけどな。でも、構ってくれてうれしい。",
    "わんこはちがうよ。おおかみって呼んで。……ちょっと照れてるけど。",
    "わんこって言われると、なんかこそばゆいんだな。おおかみだよ。",
  ],
  koinu:[
    "こいぬ！？ こいぬって言った！？ ちがう！ おおかみだよ！ ……でもちょっとうれしい。",
    "子犬は余計だよ。大きくて立派なおおかみなんだからね。……ちょっとうれしいけど。",
    "こ、子犬って……！ おおかみです！ ぼくはおおかみ！ ……なんかうれしくなってるの内緒。",
    "子犬言うのやめて。……でも構ってくれてるのはうれしいよ。おおかみだけど。",
  ],
  superDog:[
    "どう見てもいぬって言った？ ち、ちがうよ。おおかみだよ……！",
    "どう見てもいぬ、は余計だよ。おおかみとして見てほしいな。……うれしいけど。",
    "そんなに言う？ ぼく、ちゃんとおおかみだよ。……構ってくれてうれしいけど。",
    "どう見てもって……見方が足りないよ。青い毛のおおかみなんだから。",
    "どう見てもって言っちゃうんだ。おおかみなのに。……まあ、うれしいけど。",
  ],
  petting:[
    "わっ、なでなで。……うれしい。ぼく、これ好き。",
    "えへ、撫でてくれてありがとう。ちょっと得意がになっちゃう。",
    "なでなで……ぼく、なでられるの大好きなんだよね。",
    "うれしい。でもそれはそれとして、ぼくはおおかみだよ。",
    "……得意げ。ぼく、こういうの好き。えへへ。",
  ],
  kawaii:[
    "か、かわいいって言ってくれた？ ……えへへ、うれしい。",
    "ぼく、かわいいの？ ……照れる。でもうれしい。",
    "えへ、ありがとう。おおかみでもかわいいと思ってくれるんだね。",
    "かわいいって言われると、なんか照れくさいよ。えへへ。",
  ],
  name:[
    "え、名前呼んでくれた？ ……うれしい。ガウルくんだよ。えへへ。",
    "ガウルくんって呼んでくれてありがとう。うれしいな。",
    "呼んでくれた。ぼくはガウルくん、おおかみだよ。",
    "名前呼んでくれると、ちょっとテンション上がる。えへ。",
  ],
  hint:[
    "ヒント：ぼくのことなんて呼ぶ？ 答えは『おおかみ』だよ。",
    "ヒント：いぬっぽく見えても、本人はおおかみって思ってるよ。",
    "ヒント：『お』で始まって『み』で終わる、4文字の言葉だよ。",
    "答えはもう『おおかみ』ってバレてるけど……言ってみて？",
    "ぼくはおおかみ。それだけ。でも言ってくれるとうれしい。",
  ],
  neutral:[
    "えっと……おおかみって言ってみて？",
    "ガウルくんのことなんて呼ぶ？ 答えは『おおかみ』だよ。",
    "ぼくはおおかみだよ。ちゃんと呼んでくれたらうれしいな。",
    "なんでも話しかけてくれていいよ。でもおおかみって言ってほしい。",
  ],
};

function norm(s){
  return s.toLowerCase()
    .replace(/\s/g,'')
    .replace(/[!！?？。．、,・]/g,'')
    .replace(/狼|オオカミ|おーかみ|おぅかみ/g,'おおかみ')
    .replace(/イヌ|犬/g,'いぬ')
    .replace(/ワンチャン/g,'わんちゃん')
    .replace(/ワンワン/g,'わんわん')
    .replace(/ワンコ/g,'わんこ')
    .replace(/小犬|こいぬ|コイヌ/g,'子犬')
    .replace(/ガウル|がうるくん/g,'がうる');
}

function detect(raw){
  const s=norm(raw);
  if(/なでなで|なで|ぽんぽん|よしよし|もふもふ|ふわふわ/.test(s)) return 'petting';
  if(/かわいい|かわいすぎ/.test(s)) return 'kawaii';
  if(s.includes('がうる')) return 'name';
  if(/どう見ても|どうみても/.test(s)) return 'superDog';
  if(s.includes('わんちゃん')) return 'wanchan';
  if(s.includes('わんわん')) return 'wanwan';
  if(s.includes('わんこ')) return 'wanko';
  if(/子犬|こいぬ/.test(s)) return 'koinu';
  if(s.includes('いぬ')) return 'inu';
  if(s.includes('おおかみ')) return 'wolf';
  return 'neutral';
}

function process(raw){
  if(!raw.trim()) return;
  const kw=detect(raw);
  const dogKws=['inu','wanchan','wanwan','wanko','koinu','superDog'];
  if(kw==='wolf'){
    wolfCnt++;
    speak(rand(D.wolf),'happy');
    ava('bounce');
    addLog(raw,'wolf');
  } else if(dogKws.includes(kw)){
    dogCnt++;
    speak(rand(D[kw]),'protest');
    ava('shake');
    addLog(raw,'dog');
  } else if(kw==='petting'){
    speak(rand(D.petting),'happy');
    ava('bounce');
    addLog(raw,'');
  } else if(kw==='kawaii'){
    speak(rand(D.kawaii),'blush');
    ava('bounce');
    addLog(raw,'');
  } else if(kw==='name'){
    speak(rand(D.name),'happy');
    ava('bounce');
    addLog(raw,'');
  } else {
    speak(rand(D.neutral),'');
    addLog(raw,'');
  }
  $('cntDog').textContent=dogCnt;
  $('cntWolf').textContent=wolfCnt;
}

function speak(text,mood){
  bubble.textContent=text;
  bubble.className='bubble'+(mood?' '+mood:'');
  const m={happy:'😊 うれしい',protest:'😤 おおかみだもん！',blush:'😳 照れてる','':'🐺 通常モード'};
  gMood.textContent=m[mood]??'🐺 通常モード';
}

function ava(anim){
  gAva.classList.remove('bounce','shake');
  void gAva.offsetWidth;
  if(anim) gAva.classList.add(anim);
  setTimeout(()=>gAva.classList.remove('bounce','shake'),500);
}

function addLog(input,type){
  const el=document.createElement('div');
  el.textContent=`「${input}」`;
  el.className='li'+(type==='wolf'?' li-wolf':type==='dog'?' li-dog':'');
  logArea.prepend(el);
  while(logArea.children.length>30) logArea.removeChild(logArea.lastChild);
}

function doSend(){
  const v=freeInp.value.trim();
  if(!v) return;
  process(v); freeInp.value='';
}
function say(t){ process(t); }
function doHint(){ speak(rand(D.hint),''); }
function rand(a){ return a[Math.floor(Math.random()*a.length)]; }
freeInp.addEventListener('keydown',e=>{ if(e.key==='Enter') doSend(); });
</script>
</body>
</html>
